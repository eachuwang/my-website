<h2>星际穿越主题 — 你想要哪种视觉风格？</h2>
<p class="subtitle">深邃、神秘、简洁的宇宙感，以下是三种方向参考</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background: #0a0a0f; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 10px; left: 20px; width: 2px; height: 2px; background: #fff; border-radius: 50%; box-shadow: 40px 5px 0 #fff, 80px 15px 0 rgba(255,255,255,0.6), 120px 8px 0 #fff, 30px 40px 0 rgba(255,255,255,0.8);"></div>
        <div style="position: absolute; top: 60px; left: 50%; transform: translateX(-50%); color: #e8e8e8; font-size: 24px; font-weight: 300; letter-spacing: 8px;">NAME</div>
        <div style="position: absolute; bottom: 20px; color: #666; font-size: 11px; letter-spacing: 3px; text-transform: uppercase;">Developer</div>
      </div>
    </div>
    <div class="card-body">
      <h3>深空黑 + 星尘白</h3>
      <p>纯黑底色，稀疏星点，高对比度文字。极简主义，神秘冷峻。</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #0d1b2a 100%); height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 30% 20%, rgba(0,150,255,0.08) 0%, transparent 50%);"></div>
        <div style="position: absolute; top: 15px; left: 25px; width: 1px; height: 1px; background: #4cc9f0; border-radius: 50%; box-shadow: 35px 8px 0 #4cc9f0, 75px 20px 0 rgba(76,201,240,0.5), 110px 12px 0 #4cc9f0;"></div>
        <div style="position: absolute; top: 60px; left: 50%; transform: translateX(-50%); color: #e0f4ff; font-size: 24px; font-weight: 300; letter-spacing: 8px;">NAME</div>
        <div style="position: absolute; bottom: 20px; color: #4cc9f0; font-size: 11px; letter-spacing: 3px; text-transform: uppercase;">Developer</div>
      </div>
    </div>
    <div class="card-body">
      <h3>深空蓝 + 氖蓝</h3>
      <p>渐变深蓝背景，微光氖蓝点缀。科幻电影感，冷调未来主义。</p>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background: linear-gradient(160deg, #0f0c29 0%, #1a1037 50%, #0f0c29 100%); height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 70% 80%, rgba(255,200,100,0.06) 0%, transparent 40%);"></div>
        <div style="position: absolute; top: 12px; right: 30px; width: 1px; height: 1px; background: #ffd700; border-radius: 50%; box-shadow: -25px 15px 0 rgba(255,215,0,0.7), -60px 25px 0 rgba(255,215,0,0.4);"></div>
        <div style="position: absolute; top: 60px; left: 50%; transform: translateX(-50%); color: #f0e6ff; font-size: 24px; font-weight: 300; letter-spacing: 8px;">NAME</div>
        <div style="position: absolute; bottom: 20px; color: #c9a0ff; font-size: 11px; letter-spacing: 3px; text-transform: uppercase;">Developer</div>
      </div>
    </div>
    <div class="card-body">
      <h3>暗夜紫 + 星尘金</h3>
      <p>深紫黑底色，柔和金色星光点缀。神秘温暖，如穿越星河。</p>
    </div>
  </div>
</div>

<p style="margin-top: 24px; color: #888; font-size: 13px; text-align: center;">点击选择你喜欢的方向，或直接告诉我你的想法</p>
